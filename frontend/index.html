<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardio Risk Predictor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 0.6rem 0.75rem;
      width: 100%;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #534AB7;
    }

    select option { background: #1e2130; }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #534AB7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover { background: #6358d4; }
    button[type="submit"]:disabled { background: #2d3148; cursor: not-allowed; }

    /* Results */
    #result { display: none; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .badge {
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .badge.high { background: #7f1d1d; color: #fca5a5; }
    .badge.low  { background: #14532d; color: #86efac; }

    .prob-label {
      font-size: 0.875rem;
      color: #64748b;
    }

    .prob-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .bar-track {
      background: #2d3148;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
      margin: 0.5rem 0 1.5rem;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s ease;
    }

    .bar-fill.high { background: #ef4444; }
    .bar-fill.low  { background: #22c55e; }

    .uncertainty-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
    }

    .stat {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 0.75rem;
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    .error {
      background: #7f1d1d;
      border: 1px solid #991b1b;
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      display: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .overlay.visible {
      display: flex;
    }

    .popup {
      background: #1e2130;
      border: 1px solid #78350f;
      border-radius: 12px;
      padding: 1.75rem;
      max-width: 420px;
      width: 90%;
    }

    .popup-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fbbf24;
      margin-bottom: 0.5rem;
    }

    .popup-body {
      font-size: 0.875rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }

    .popup-body strong { color: #e2e8f0; }

    .popup-close {
      width: 100%;
      padding: 0.6rem;
      background: #78350f;
      color: #fef3c7;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .popup-close:hover { background: #92400e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cardio Risk Predictor</h1>
    <p class="subtitle">Bayesian classifier — enter patient data to get a prediction with uncertainty estimate</p>

    <div class="card">
      <form id="form">
        <div class="grid">
          <div class="field">
            <label>Age</label>
            <input type="number" name="age" min="18" max="120" required placeholder="e.g. 45" />
          </div>

          <div class="field">
            <label>Sex</label>
            <select name="sex" required>
              <option value="">Select...</option>
              <option value="1">Male</option>
              <option value="0">Female</option>
            </select>
          </div>

          <div class="field">
            <label>Cigarettes / day</label>
            <input type="number" name="cigs_per_day" min="0" required placeholder="0 if non-smoker" />
          </div>

          <div class="field">
            <label>Sickle cell genotype</label>
            <select name="sickle_cell_genotype" required>
              <option value="">Select...</option>
              <option value="AA">AA</option>
              <option value="AS">AS</option>
              <option value="SS">SS</option>
            </select>
          </div>

          <div class="field">
            <label>Malaria exposure</label>
            <select name="malaria_exposure" required>
              <option value="">Select...</option>
              <option value="0.0">Rare (0.0)</option>
              <option value="0.5">Recent (0.5)</option>
              <option value="1.0">Chronic (1.0)</option>
            </select>
          </div>

          <div class="field">
            <label>Hemoglobin (g/dL)</label>
            <input type="number" name="hemoglobin_g_per_dL" step="0.1" required placeholder="e.g. 13.5" />
          </div>

          <div class="field">
            <label>Heart rate (bpm)</label>
            <input type="number" name="heart_rate_bpm" min="30" max="250" required placeholder="e.g. 78" />
          </div>

          <div class="field">
            <label>Cholesterol (mg/dL)</label>
            <input type="number" name="cholesterol_mg_per_dL" step="0.1" required placeholder="e.g. 210.0" />
          </div>

          <div class="field">
            <label>Blood pressure — systolic</label>
            <input type="number" name="blood_pressure_upper" required placeholder="e.g. 120" />
          </div>

          <div class="field">
            <label>Blood pressure — diastolic</label>
            <input type="number" name="blood_pressure_lower" required placeholder="e.g. 80" />
          </div>
        </div>

        <button type="submit" id="submitBtn">Predict</button>
      </form>
    </div>

    <div class="error" id="error"></div>

    <div class="card" id="result">
      <div class="result-header">
        <div>
          <div class="prob-label">Cardio risk probability</div>
          <div class="prob-value" id="probValue">—</div>
        </div>
        <span class="badge" id="badge">—</span>
      </div>

      <div class="bar-track">
        <div class="bar-fill" id="barFill" style="width: 0%"></div>
      </div>

      <div class="prob-label" style="margin-bottom: 0.75rem;">Uncertainty (95% CI)</div>
      <div class="uncertainty-grid">
        <div class="stat">
          <div class="stat-label">Mean</div>
          <div class="stat-value" id="uMean">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Std</div>
          <div class="stat-value" id="uStd">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Lower 2.5%</div>
          <div class="stat-value" id="uLower">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Upper 97.5%</div>
          <div class="stat-value" id="uUpper">—</div>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="uncertaintyOverlay">
    <div class="popup">
      <div class="popup-title">High model uncertainty</div>
      <div class="popup-body" id="uncertaintyMsg"></div>
      <button class="popup-close" id="overlayClose">Understood</button>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000/predict";

    document.getElementById("overlayClose").addEventListener("click", () => {
      document.getElementById("uncertaintyOverlay").classList.remove("visible");
    });

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const errorEl = document.getElementById("error");
      const resultEl = document.getElementById("result");

      btn.disabled = true;
      btn.textContent = "Running inference...";
      errorEl.style.display = "none";
      resultEl.style.display = "none";

      const data = Object.fromEntries(new FormData(e.target));
      const payload = {
        age: parseInt(data.age),
        sex: parseInt(data.sex),
        cigs_per_day: parseInt(data.cigs_per_day),
        sickle_cell_genotype: data.sickle_cell_genotype,
        malaria_exposure: parseFloat(data.malaria_exposure),
        hemoglobin_g_per_dL: parseFloat(data.hemoglobin_g_per_dL),
        heart_rate_bpm: parseInt(data.heart_rate_bpm),
        cholesterol_mg_per_dL: parseFloat(data.cholesterol_mg_per_dL),
        blood_pressure_upper: parseFloat(data.blood_pressure_upper),
        blood_pressure_lower: parseFloat(data.blood_pressure_lower),
      };

      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail ?? "Server error");
        }

        const { prediction, probability, uncertainty } = await res.json();
        const pct = (probability * 100).toFixed(1);
        const isHigh = prediction === 1;

        document.getElementById("probValue").textContent = pct + "%";

        const badge = document.getElementById("badge");
        badge.textContent = isHigh ? "High risk" : "Low risk";
        badge.className = "badge " + (isHigh ? "high" : "low");

        const bar = document.getElementById("barFill");
        bar.style.width = pct + "%";
        bar.className = "bar-fill " + (isHigh ? "high" : "low");

        document.getElementById("uMean").textContent = (uncertainty.mean * 100).toFixed(1) + "%";
        document.getElementById("uStd").textContent = (uncertainty.std * 100).toFixed(1) + "%";
        document.getElementById("uLower").textContent = (uncertainty.lower * 100).toFixed(1) + "%";
        document.getElementById("uUpper").textContent = (uncertainty.upper * 100).toFixed(1) + "%";

        resultEl.style.display = "block";

        const highStd = uncertainty.std > 0.10;
        const wideCI = (uncertainty.upper - uncertainty.lower) >= 0.5;
        if (highStd || wideCI) {
          const reasons = [];
          if (highStd) reasons.push(`standard deviation of <strong>${(uncertainty.std * 100).toFixed(1)}%</strong> (threshold: 10%)`);
          if (wideCI) reasons.push(`CI width of <strong>${((uncertainty.upper - uncertainty.lower) * 100).toFixed(1)}%</strong> (lower: ${(uncertainty.lower * 100).toFixed(1)}%, upper: ${(uncertainty.upper * 100).toFixed(1)}%)`);
          document.getElementById("uncertaintyMsg").innerHTML =
            "The model is uncertain about this prediction due to " + reasons.join(" and ") +
            ". The result should be interpreted with caution and verified clinically.";
          document.getElementById("uncertaintyOverlay").classList.add("visible");
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Predict";
      }
    });
  </script>
</body>
</html>

services:
  server:
    build:
      context: .
      dockerfile: src/server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "8080:8080"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      - server
    command: mlflow server --host 0.0.0.0 --port 8080 --backend-store-uri /mlflow/mlruns --default-artifact-root /mlflow/artifacts --allowed-hosts mlflow:8080,localhost:8080,localhost

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mlflow_data:
